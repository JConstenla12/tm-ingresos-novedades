<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Todomusica — Ingresos de Mayo</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg: radial-gradient(circle at top left, #0a1a3a, #070b14 70%);
  --panel:#0b1220;
  --card:#0f1930;
  --stroke:rgba(255,255,255,.10);
  --text:#eaf0ff;
  --muted:#9db0d4;
  --accent:#f59e0b; /* dorado */
  --good:#22c55e;
  --warn:#fbbf24;
  --ing:#38bdf8;  /* ingresando */
  --bad:#ef4444;
}
body.theme-light{
  --bg: linear-gradient(135deg,#f8fafc,#e2e8f0);
  --panel:#ffffff;
  --card:#ffffff;
  --stroke:rgba(0,0,0,.12);
  --text:#0b1220;
  --muted:#4b5563;
}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);}

.top{
  background:linear-gradient(180deg,var(--panel),var(--bg));
  border-bottom:1px solid var(--stroke);
}
.wrap{max-width:1100px;margin:0 auto;padding:12px;}

.brandRow{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.brandLeft{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.logo{font-weight:900;font-size:26px;letter-spacing:.2px;}
.social{display:flex;gap:8px;align-items:center;}
.iconBtn{
  width:30px;height:30px;border-radius:999px;
  border:1px solid var(--stroke);background:rgba(255,255,255,.06);
  display:inline-flex;align-items:center;justify-content:center;
  text-decoration:none;color:var(--text);
  transition: transform .12s ease, background .12s ease, box-shadow .12s ease, border-color .12s ease;
}
.iconBtn svg{width:16px;height:16px;opacity:.95}
.rightBtns{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn{
  border:1px solid var(--stroke);
  background:rgba(255,255,255,.06);
  color:var(--text);
  padding:8px 10px;border-radius:12px;
  cursor:pointer;font-size:12px;
  transition: transform .12s ease, filter .12s ease, background .12s ease, box-shadow .12s ease, border-color .12s ease;
}
  .iconBtn:active{
  transform: scale(.92);
  box-shadow: 0 0 0 3px rgba(245,158,11,.3), 0 6px 18px rgba(245,158,11,.25);
}
.btn.primary{
  background:var(--accent);
  color:#111;
  border-color:rgba(0,0,0,.15);
  font-weight:800;
  box-shadow: 0 6px 16px rgba(245,158,11,.25);
}
 .btn:active{
  transform: translateY(1px) scale(.98);
  background: rgba(245,158,11,.18);
  box-shadow: 0 0 0 3px rgba(245,158,11,.25), 0 8px 20px rgba(245,158,11,.25);
}

.btn.primary:active{
  box-shadow: 0 0 0 3px rgba(245,158,11,.22), 0 10px 22px rgba(245,158,11,.18);
}

.addr{margin-top:8px;color:var(--muted);font-size:11px;line-height:1.25;}
  
.addr a{
  color:#3b82f6;
  text-decoration:underline;
}


.hTitle{margin-top:10px;display:flex;justify-content:space-between;align-items:flex-end;gap:10px;flex-wrap:wrap;}
.hTitle h1{margin:0;font-size:18px;font-weight:900;}
.hTitle .sub{color:var(--muted);font-size:12px;}

.tools{margin-top:10px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;}
.tools .inp{grid-column:1 / -1;}
.tools select{width:100%;}
.inp, select{
  width:100%;box-sizing:border-box;
  padding:10px 12px;border-radius:14px;
  border:1px solid var(--stroke);
  background:var(--card);color:var(--text);outline:none;
  font-size:13px;
}

.totals{
  margin-top:10px;
  border:1px solid var(--stroke);
  background:rgba(255,255,255,.04);
  border-radius:16px;
  padding:10px 12px;
  display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;
  color:var(--muted);font-size:12px;
}
.totals b{color:var(--text);}

.content{max-width:1100px;margin:0 auto;padding:12px 12px 120px;}
 .grid{
  display:grid;
  grid-template-columns:1fr;   /* 👈 SIEMPRE 1 en mobile */
  gap:14px;
  padding:12px;
  border-radius:18px;

  background: rgba(255,255,255,.03);
  border:1px solid var(--stroke);
}

.card{
  background: var(--card);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 18px;
  padding:16px;

  display:grid;
  grid-template-columns:210px 1fr;
  gap:16px;
  align-items:start;

  box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
  transition: transform .12s ease;
}
 .card.inCart{
  border:1px solid rgba(245,158,11,.5);
  box-shadow: 0 0 0 2px rgba(245,158,11,.2), 0 10px 30px rgba(245,158,11,.2);
}
  .card.inCart .badge{
  border-color: rgba(245,158,11,.35);
}

.card:active{
  transform: scale(.995);
}

/* en modo claro: borde más fino y limpio */
body.theme-light .card{
  border: 1px solid rgba(0,0,0,.08);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.85);
}


.imgBox{
  width:210px;
  height:210px;
  border-radius:16px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--stroke);
  overflow:hidden;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
}
  .imgBox:active{
  transform: scale(.99);
  border-color: rgba(245,158,11,.35);
  box-shadow: 0 0 0 3px rgba(245,158,11,.14);
}
.imgBox img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;}


.pTitle{font-weight:900;font-size:14px;margin:0 0 4px;}
.pDesc{
  margin:0;color:var(--muted);font-size:12px;line-height:1.25;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:4;overflow:hidden;
}

.badges{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:12px;}
.badge{
  border:1px solid var(--stroke);
  background:rgba(255,255,255,.06);
  padding:4px 8px;border-radius:999px;color:var(--muted);font-weight:700;
  transition: all .2s ease;
}
.badge b{color:var(--text)}
.badge.stock-good b{color:var(--good)}
.badge.stock-warn b{color:var(--warn)}
.badge.stock-ing b{color:var(--ing)}
.badge.stock-bad b{color:var(--bad)}

.buyRow{margin-top:10px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.price{font-size:16px;font-weight:900;}
.small{color:var(--muted);font-size:12px;}

.qty{display:flex;align-items:center;gap:8px;}
.qbtn{
  width:40px;height:40px;
  border-radius:14px;
  border:1px solid var(--stroke);
  background:rgba(255,255,255,.06);
  color:var(--text);
  cursor:pointer;
  font-size:20px;
  line-height:1;
  transition: transform .10s ease, background .12s ease, box-shadow .12s ease;
}
 .qbtn:active{
  transform: scale(.92);
  background: rgba(245,158,11,.22);
  box-shadow: 0 0 0 3px rgba(245,158,11,.3), 0 6px 18px rgba(245,158,11,.25);
}
.qval{width:30px;text-align:center;font-weight:900;}

.cartBar{
  position:fixed;left:0;right:0;bottom:0;
  padding:10px;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.65));
}
.cartInner{
  max-width:1100px;margin:0 auto;
  border:1px solid var(--stroke);
  background:rgba(7,11,20,.92);
  border-radius:16px;
  padding:10px 12px;
  display:none;
  align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
}
.cartLeft b{font-size:13px}
.cartLeft div{font-size:12px;color:var(--muted)}
.cartRight{display:flex;gap:8px;flex-wrap:wrap}

.modal{
  position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.75);z-index:100;padding:14px;
}
.modalBox{
  width:min(920px,96vw);height:min(650px,86vh);
  border:1px solid rgba(255,255,255,.12);
  background:#050a14;border-radius:18px;overflow:hidden;
  display:flex;flex-direction:column;
}
  .modalBody{
  flex:1;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#030611;

  overflow:hidden;   /* 👈 evita que la imagen se desborde */
}
  .modalBody img{
  max-width:90%;
  max-height:85%;
  object-fit:contain;
  object-position:center;
}
.modalTop{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.12);
}
.modalTop button{
  padding:8px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.10);
  color:#fff;
  cursor:pointer;
  font-weight:700;
  transition: all .15s ease;
}

.modalTop button:active{
  transform: scale(.96);
  background: rgba(245,158,11,.25);
  box-shadow: 0 0 0 3px rgba(245,158,11,.25);
}

.nav{
  position:absolute;
 top:65%;
transform:translateY(-50%);

  width:52px;
  height:52px;

  border-radius:999px;

  background:#ffffff;
  color:#000;

  border:2px solid #000;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:26px;
  font-weight:900;

  cursor:pointer;
  z-index:3;

  box-shadow:0 10px 25px rgba(0,0,0,.4);
  transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
}
  .nav:active{
  transform: translateY(-50%) scale(.92);
  filter: brightness(1.05);
  box-shadow: 0 10px 25px rgba(0,0,0,.45), 0 0 0 3px rgba(245,158,11,.18);
}
.nav.left{left:10px}
.nav.right{right:10px}
.dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:6px}
.dot{width:7px;height:7px;border-radius:999px;background:rgba(255,255,255,.25)}
.dot.on{background:rgba(245,158,11,.95)}

body.force-desktop .grid{grid-template-columns:repeat(2,minmax(0,1fr));}
@media (min-width: 900px){
  .tools{grid-template-columns:1.4fr 1fr 1fr 1fr;}
  .grid{
    grid-template-columns:repeat(2,minmax(0,1fr)); /* solo cambia columnas */
  }
}
  .brandLeft{
  display:flex;
  align-items:center;
  gap:8px;
}

.logo{
  margin-right:4px;
}

.social{
  display:flex;
  gap:6px;
  margin-left:0;
}
  @media (max-width:520px){
  .tools{
    grid-template-columns:1fr 1fr 1fr;
  }

  .tools select,
  .tools .inp{
    padding:8px 10px;
    font-size:12px;
    border-radius:10px;
  }

  .tools select{
    padding:6px 8px;
    font-size:11.5px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
}
.offTag{
  background: #ef4444;          /* rojo fuerte */
  border: 1px solid #ef4444;
  color: #ffffff;               /* blanco */
  font-weight: 900;
  letter-spacing: .2px;
  box-shadow: 0 6px 16px rgba(239,68,68,.35);
}
 .oldPrice{
  color: var(--muted);
  text-decoration: line-through;
  font-size: 12px;
  margin-top: 2px;
}
.netLabel{
  color: var(--muted);
  font-size: 12px;
  margin-top: 2px;
}
  .imgBox{ position:relative; }

.stickerOff{
  position:absolute;
  top:10px;
  left:10px;
  background:#ef4444;
  color:#fff;
  font-weight:900;
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  box-shadow:0 10px 22px rgba(239,68,68,.35);
  border:1px solid rgba(255,255,255,.15);
  z-index:3;
}
 .themeSwitch{
  display:flex;
  align-items:center;
  cursor:pointer;
   margin-left:8px;
padding:4px;
background:rgba(255,255,255,.04);
border-radius:999px;
   margin-top:-6px;
}

.switchTrack{
  position:relative;
  width:70px;
  height:32px;
  border-radius:999px;

  background:linear-gradient(135deg,#0f172a,#1e3a8a);

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 8px;

  box-shadow:0 6px 20px rgba(0,0,0,.4);
}

.switchTrack span{
  font-size:14px;
  z-index:2;
}

.switchKnob{
  position:absolute;
  width:26px;
  height:26px;
  border-radius:50%;

 background:linear-gradient(145deg,#ffffff,#e5e7eb);
  border:1px solid rgba(0,0,0,.15);

  left:3px;
  top:3px;

  transition:all .25s ease;

  box-shadow:0 4px 12px rgba(0,0,0,.4);
}
  
  /* MODO CLARO ACTIVO */
body.theme-light .switchTrack{
  background:linear-gradient(135deg,#f59e0b,#fcd34d);
  box-shadow:0 8px 20px rgba(0,0,0,.15);
}

body.theme-light .switchKnob{
  left:54px;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
}
  .moon{
  color:#fff;
}

.sun{
  color:#fff;
}

body:not(.theme-light) .moon{
  text-shadow:0 0 10px rgba(255,255,255,.9), 0 0 20px rgba(255,255,255,.5);
}

body.theme-light .sun{
  text-shadow:0 0 10px rgba(255,200,0,.9), 0 0 20px rgba(255,200,0,.6);
}
 
/* 👇 elimina highlight feo */
a, button, .imgBox, .card{
  -webkit-tap-highlight-color: transparent;
}

/* 👇 mobile real */
@media (max-width: 700px){

  .card{
    grid-template-columns: 1fr;   /* 1 columna */
  }

  .imgBox{
    width:100%;
    height:auto;
    aspect-ratio:1 / 1;
  }

  .buyRow{
    flex-direction:column;
    align-items:flex-start;
    gap:8px;
  }

  .qty{
    align-self:flex-end;
  }
}

/* 👇 hover SOLO en dispositivos con mouse (PC/notebook) */
@media (hover:hover){

  .btn:hover{
    filter: brightness(1.1);
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(0,0,0,.25);
  }

  .iconBtn:hover{
    transform: scale(1.1);
    background: rgba(255,255,255,.15);
  }

.qbtn:hover{
  background: var(--accent);           /* dorado sólido */
  color:#111;                          /* contraste */
  border-color: rgba(245,158,11,.6);   /* borde dorado */
  box-shadow: 0 6px 18px rgba(245,158,11,.35);
  transform: translateY(-1px);
}


}
  /* =========================
   NOTEBOOK / DESKTOP PRO
   ========================= */
@media (min-width: 1024px){

  .wrap,
  .content,
  .cartInner{
    max-width: 920px;
  }

  .wrap{
    padding-left: 28px;
    padding-right: 28px;
  }

  .content{
    padding: 18px 28px 120px;
  }

  .brandRow{
    align-items: center;
  }

  .addr{
    max-width: 780px;
  }

  .hTitle{
    margin-top: 14px;
    align-items: center;
  }

  .hTitle .sub{
    max-width: 420px;
    text-align: right;
  }

  .tools{
    grid-template-columns: minmax(320px, 2.2fr) repeat(3, minmax(170px, 1fr));
    gap: 12px;
    align-items: center;
  }

  .tools .inp{
    grid-column: auto;
  }

  .inp,
  select{
    min-height: 46px;
  }

  .totals{
    display: grid;
    grid-template-columns: repeat(5, max-content) 1fr auto auto;
    align-items: center;
    column-gap: 18px;
    row-gap: 10px;
    padding: 12px 16px;
  }

  .totals span{
    white-space: nowrap;
  }

  #wa,
  #btnCopyTop{
    justify-self: end;
  }

  .grid{
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
    padding: 18px;
  }

  .card{
    min-height: 320px;
  }
}

@media (min-width: 1360px){
  .wrap,
  .content,
  .cartInner{
    max-width: 1360px;
  }

  .grid{
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

  background:#1877f2;
  color:#fff;

/* Instagram */

  background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);

/* YouTube */
.iconBtn[href*="youtube"]:active{
  background:#ff0000;
  color:#fff;

#splash{
  position:fixed;
  inset:0;
  background:#050a14;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;

  animation: splashOut .5s ease forwards;
  animation-delay: 1s;
}
@media (min-width: 1024px){

  body{
    padding-left: 80px;
    padding-right: 80px;
    box-sizing: border-box;
  }

}
@keyframes splashOut{
  to{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }
}



.splashBox{ text-align:center; }

.splashLogo{
  font-size:56px;

  color:#f59e0b;

  text-shadow:0 0 20px rgba(245,158,11,.5);
}

.splashText{
  margin-top:10px;
  color:#9db0d4;
  font-size:14px;
}
</style>

      <span>Total: <b id="tot">$0</b></span>
      <a class="btn primary" id="wa" href="#" target="_blank" rel="noopener">WhatsApp</a>
      <button class="btn primary" id="btnCopyTop">Copiar pedido</button>
    </div>
  </div>
</div>

<div class="content">
  <div class="grid" id="grid"></div>
</div>

<div class="cartBar">
  <div class="cartInner" id="cart">
    <div class="cartLeft">
      <b id="cIt">0 ítems</b>
      <div id="cTot">Total: $0</div>
    </div>
    <div class="cartRight">
      <button class="btn" id="btnEmpty">Vaciar</button>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modalBox">
    <div class="modalTop">
      <b id="mT">Producto</b>
      <button id="mX">Cerrar ✕</button>
    </div>
    <div class="modalBody">
      <button class="nav left" id="mL">‹</button>
      <img id="mI" alt="Imagen producto">
      <button class="nav right" id="mR">›</button>
      <div class="dots" id="dots"></div>
    </div>
  </div>
</div>

<script>
const CSV = "ingresostm_mayo.csv";
const PLACE = "data:image/svg+xml;utf8," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='640' height='480'><rect width='100%' height='100%' fill='#0b1220'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='Arial' font-size='26' fill='#9db0d4'>Sin imagen</text></svg>`);

const CART = new Map();
let ALL = [], VIEW = [];

function num(v){
  if(v==null) return NaN;
  let s=String(v).replace(/\r/g,'').trim();
  if(!s) return NaN;
  s=s.replace(/\$/g,'').replace(/\s+/g,'');
  const lc=s.lastIndexOf(','), ld=s.lastIndexOf('.');
  if(lc>-1 && ld>-1){ s = (lc>ld)? s.replace(/\./g,'').replace(',','.') : s.replace(/,/g,''); }
  else if(lc>-1 && ld===-1){ s=s.replace(',','.'); }
  const n=Number(s); return Number.isFinite(n)?n:NaN;
}
function pct(v){
  let n=num(v); if(!Number.isFinite(n)) return 0;
  if(n>1) n=n/100; return n;
}
function ars(n){ return "$"+n.toLocaleString("es-AR",{minimumFractionDigits:2,maximumFractionDigits:2}); }

function parseCSV(text, d){
  const rows=[]; let row=[]; let f=""; let q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], nx=text[i+1];
    if(q){
      if(c=='"' && nx=='"'){ f+='"'; i++; }
      else if(c=='"'){ q=false; }
      else f+=c;
    }else{
      if(c=='"') q=true;
      else if(c===d){ row.push(f); f=""; }
      else if(c=="\n" || (c=="\r" && nx=="\n")){
        row.push(f); rows.push(row); row=[]; f="";
        if(c=="\r") i++;
      }else f+=c;
    }
  }
  if(f.length||row.length){ row.push(f); rows.push(row); }
  return rows;
}
function rowsToObj(rows){
  const h=rows[0].map(x=>x.replace(/^\uFEFF/,'').trim());
  const out=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; if(!r||!r.length) continue;
    const o={}; for(let j=0;j<h.length;j++) o[h[j]]=(r[j]??"").trim();
    if(Object.values(o).some(x=>x!=="")) out.push(o);
  }
  return out;
}

function imgs(p){
  const a=[p.IMAGEN_URL_1,p.IMAGEN_URL_2,p.IMAGEN_URL_3,p.IMAGEN_URL_4,p.IMAGEN_URL_5].map(x=>(x??"").trim()).filter(Boolean);
  return a.length?a:[PLACE];
}
function stkNorm(v){
  const s=String(v||"").replace(/\s+/g,'').toUpperCase();
  if(s.includes("INGRES")) return "INGRESANDO";
  if(s===">10") return ">10";
  if(s==="<10" || s===" <10") return "<10";
  return s || "";
}
function pvcNeto(p){
  const pvc=num(p.PVC);
  const off=pct(p.OFF);
  if(!Number.isFinite(pvc)) return 0;
  return pvc*(1-off);
}
function qty(p){ return CART.get(p.ARTICULO)?.q ?? 0; }
function setQty(p, q){
  q=Math.max(0, q|0);
  const k=p.ARTICULO;
  if(!k) return;

  if(q===0) CART.delete(k); 
  else CART.set(k,{q,p});

  // ✅ guardar en localStorage
  localStorage.setItem("tm_cart", JSON.stringify([...CART]));

  totals();
  render();
}

function badgeStock(v){
  const s=stkNorm(v);
  if(s==="INGRESANDO") return `<span class="badge stock-ing"><b>INGRESANDO</b></span>`;
  if(s===">10") return `<span class="badge stock-good">Stock: <b>&gt;10</b></span>`;
  if(s==="<10") return `<span class="badge stock-warn">Stock: <b>&lt;10</b></span>`;
  if(s==="0") return `<span class="badge stock-bad">Stock: <b>0</b></span>`;
  return `<span class="badge">Stock: <b>${s||"—"}</b></span>`;
}

function card(p){
  const marca = p.MARCA || "";
  const art   = p.ARTICULO || "";
  const desc  = p.DESCRIPCION || "";
  const rub   = p.RUBRO || "";

  const net = pvcNeto(p);
  const off = pct(p.OFF);
  const pvL = num(p.PVL);
  const mk  = pct(p.MKUP);
  const iva = pct(p.IVA);
  const ii  = pct(p.II);

  const q = qty(p);
  const inCart = q > 0 ? "inCart" : "";

  const im = (p.IMAGEN_URL_1 || "").trim() || PLACE;

  return `
  <div class="card ${inCart}" data-k="${art}">
    <div class="imgBox" data-z="1">
      ${off>0 ? `<div class="stickerOff">${Math.round(off*100)}% OFF</div>` : ``}
      <img src="${im}" onerror="this.onerror=null;this.src='${PLACE}'">
    </div>

    <div>
      <div class="pTitle">${marca} · ${art}</div>
      <p class="pDesc">${desc}</p>

      <div class="badges">
        <span class="badge"><b>${rub||"—"}</b></span>
        ${badgeStock(p.STOCK_TXT)}
        ${off>0 ? `<span class="badge offTag">${Math.round(off*100)}% OFF</span>` : ``}
        <span class="badge">IVA: <b>${(iva*100).toLocaleString("es-AR", { maximumFractionDigits: 1 })}%</b></span>
        <span class="badge">II: <b>${Math.round(ii*100)}%</b></span>
        ${Number.isFinite(pvL)?`<span class="badge">PVL: <b>${ars(pvL)}</b></span>`:""}
        ${mk>0?`<span class="badge">MKUP: <b>${Math.round(mk*100)}%</b></span>`:""}
      </div>

      <div class="buyRow">
        <div>
          ${off>0 ? `<div class="oldPrice">PVC: ${ars(num(p.PVC))}</div>` : ``}
          <div class="price">${ars(net)}</div>
          <div class="netLabel">PVC Neto</div>
        </div>

        <div class="qty">
          <button class="qbtn" data-a="d">–</button>
          <div class="qval">${q}</div>
          <button class="qbtn" data-a="i">+</button>
        </div>
      </div>
    </div>
  </div>`;
}
function render(){
  const g=document.getElementById("grid");
  g.innerHTML = VIEW.map(card).join("");

  g.querySelectorAll(".card").forEach(el=>{
    const k=el.getAttribute("data-k");
    const p=VIEW.find(x=>x.ARTICULO===k);
    if(!p) return;

    el.querySelectorAll("[data-a]").forEach(b=>{
      b.onclick=()=>{
        const act=b.getAttribute("data-a");
        const cur=qty(p);
        setQty(p, act==="i"?cur+1:cur-1);
      };
    });

    const z=el.querySelector("[data-z]");
    if(z) z.onclick=()=>openModal(p);
  });
}

function apply(){
  const q=(document.getElementById("q").value||"").toLowerCase().trim();
  const m=document.getElementById("fMarca").value;
  const r=document.getElementById("fRubro").value;
  const s=document.getElementById("fStk").value;

  VIEW = ALL.filter(p=>{
    if(m && (p.MARCA||"")!==m) return false;
    if(r && (p.RUBRO||"")!==r) return false;
    if(s){
      const st=stkNorm(p.STOCK_TXT);
      if(st!==s) return false;
    }
    if(!q) return true;
    const blob=[p.MARCA,p.ARTICULO,p.DESCRIPCION,p.RUBRO].join(" ").toLowerCase();
    return blob.includes(q);
  });

  render();
  totals();
}

function totals(){
  let sub=0, iva=0, ii=0, items=0;
  for(const [k,v] of CART.entries()){
    const p=v.p, q=v.q;
    const net=pvcNeto(p);
    const line=net*q;
    sub += line;
    iva += line*pct(p.IVA);
    ii  += line*pct(p.II);
    items++;
  }
  const tot=sub+iva+ii;
  document.getElementById("it").textContent=String(items);
  document.getElementById("sub").textContent=ars(sub);
  document.getElementById("iva").textContent=ars(iva);
  document.getElementById("ii").textContent=ars(ii);
  document.getElementById("tot").textContent=ars(tot);

  const cart=document.getElementById("cart");
  if(items>0){
    cart.style.display="flex";
    document.getElementById("cIt").textContent=`${items} ítems`;
    document.getElementById("cTot").textContent=`Total: ${ars(tot)}`;
  }else cart.style.display="none";

  const txt = buildWA(sub,iva,ii,tot);
  document.getElementById("wa").href="https://wa.me/?text="+encodeURIComponent(txt);
}

function buildWA(sub, iva, ii, tot){

  const lines = [];

  lines.push("Pedido — Ingresos de Mayo (Todomusica)");
  lines.push("");

  for(const [k, v] of CART.entries()){

    const p = v.p;
    const q = v.q;
    const net = pvcNeto(p);

    lines.push(`${p.MARCA || ""}`);        // marca
    lines.push(`${p.ARTICULO || ""}`);     // 👈 artículo SOLO
    lines.push(`Cant: ${q}`);              
    lines.push(`${ars(net)}`);             // precio neto
    lines.push("");                        // separación entre items

  }

  lines.push("--------------------------------");
  lines.push("");
  lines.push(`Subtotal: ${ars(sub)}`);
  lines.push(`IVA: ${ars(iva)}`);
  lines.push(`Imp. Int: ${ars(ii)}`);
  lines.push(`TOTAL: ${ars(tot)}`);
  lines.push("");
  lines.push("Los precios están sujetos a modificaciones sin previo aviso");

  return lines.join("\n");
}

// Modal (flechas + dots)
let M_P=null, M_A=[], M_I=0;
function dots(){
  const d=document.getElementById("dots");
  d.innerHTML=M_A.map((_,i)=>`<div class="dot ${i===M_I?"on":""}"></div>`).join("");
}
function show(){
  document.getElementById("mI").src=M_A[M_I]||PLACE;
  dots();
}
function openModal(p){
  M_P=p; M_A=imgs(p); M_I=0;
  document.getElementById("mT").textContent=`${p.MARCA} · ${p.ARTICULO}`;
  document.getElementById("modal").style.display="flex";
  show();
}
function closeModal(){ document.getElementById("modal").style.display="none"; }
function next(){ M_I=(M_I+1)%M_A.length; show(); }
function prev(){ M_I=(M_I-1+M_A.length)%M_A.length; show(); }

document.getElementById("mX").onclick=closeModal;
document.getElementById("modal").onclick=(e)=>{ if(e.target.id==="modal") closeModal(); }
document.getElementById("mR").onclick=(e)=>{ e.stopPropagation(); next(); }
document.getElementById("mL").onclick=(e)=>{ e.stopPropagation(); prev(); }

// Copiar pedido (botón arriba)
document.getElementById("btnCopyTop").onclick=async ()=>{
  const sub = num(document.getElementById("sub").textContent.replace(/[^\d,.-]/g,""))||0; // no crítico
  const txt = buildWA(
    num(document.getElementById("sub").textContent.replace(/[^\d,.-]/g,""))||0,
    num(document.getElementById("iva").textContent.replace(/[^\d,.-]/g,""))||0,
    num(document.getElementById("ii").textContent.replace(/[^\d,.-]/g,""))||0,
    num(document.getElementById("tot").textContent.replace(/[^\d,.-]/g,""))||0
  );
  try{ await navigator.clipboard.writeText(txt); alert("Pedido copiado."); }
  catch{ window.prompt("Copiá el pedido:", txt); }
};

// Vaciar
document.getElementById("btnEmpty").onclick=()=>{
  CART.clear();

  // ✅ borrar storage
  localStorage.removeItem("tm_cart");

  totals();
  render();
};

// Load CSV
fetch(CSV+"?cb="+Date.now())
  .then(r=>r.text())
  .then(t=>{
    const first=t.split(/\r?\n/)[0]||"";
    const delim = first.includes(";") ? ";" : ",";
    ALL = rowsToObj(parseCSV(t, delim));

    // llenar combos
    const marcas=[...new Set(ALL.map(x=>(x.MARCA||"").trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"es",{sensitivity:"base"}));
    const rubros=[...new Set(ALL.map(x=>(x.RUBRO||"").trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"es",{sensitivity:"base"}));

    const fm=document.getElementById("fMarca");
    marcas.forEach(m=>{ const o=document.createElement("option"); o.value=m;o.textContent=m; fm.appendChild(o); });

    const fr=document.getElementById("fRubro");
    rubros.forEach(r=>{ const o=document.createElement("option"); o.value=r;o.textContent=r; fr.appendChild(o); });
VIEW=[...ALL];

// ✅ RECUPERAR CARRITO
const savedCart = localStorage.getItem("tm_cart");

if (savedCart){
  const arr = JSON.parse(savedCart);
  arr.forEach(([k,v])=>{
    CART.set(k,v);
  });
}

render();
totals();
      })
  .catch(err=>{
    alert("No pude leer ingresostm_mayo.csv. Revisá que esté en la raíz del repo.");
    console.error(err);
  });

// filtros
["q","fMarca","fRubro","fStk"].forEach(id=>{
  document.getElementById(id).addEventListener("input", apply);
  document.getElementById(id).addEventListener("change", apply);
});
  
// THEME
const btnTheme = document.getElementById("btnTheme");

if (btnTheme){

  const saved = localStorage.getItem("tm_theme");

  if (saved === "light"){
    document.body.classList.add("theme-light");
  }

  btnTheme.onclick = () => {

    document.body.classList.toggle("theme-light");

    const isLight = document.body.classList.contains("theme-light");

    localStorage.setItem("tm_theme", isLight ? "light" : "dark");

  };
}
</script>
</body>
</html>
